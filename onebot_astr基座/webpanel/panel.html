<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AstrBot 基座</title>
<style>
  :root{
    --bg:#fff; --bg2:#f8f9fa; --bg3:#f1f5f9;
    --text:#1e293b; --text2:#475569; --text3:#94a3b8;
    --border:#e2e8f0;
    --accent:#5865f2; --accent-hover:#4752c4;
    --success:#10b981; --danger:#ef4444; --warning:#f59e0b;
    --radius:12px; --radius-sm:8px;
    --accent-soft:color-mix(in srgb,var(--accent) 12%,transparent);
    --success-soft:color-mix(in srgb,var(--success) 16%,transparent);
    --danger-soft:color-mix(in srgb,var(--danger) 16%,transparent);
    --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
    --shadow-md:0 4px 16px rgba(0,0,0,.08);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--bg2);color:var(--text);font-size:14px;line-height:1.5;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",Arial,sans-serif;-webkit-font-smoothing:antialiased}
  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-thumb{background:rgba(100,116,139,.35);border-radius:4px}

  .page-wrap{height:100vh;display:flex;flex-direction:column;overflow:hidden}
  .topbar{display:flex;align-items:center;gap:14px;padding:14px 20px;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0}
  .logo{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--accent),#7289da);color:#fff;flex-shrink:0}
  .logo svg{width:18px;height:18px}
  .brand{font-size:15px;font-weight:700}
  .brand small{display:block;font-size:11px;font-weight:500;color:var(--text3)}
  .tabs{display:flex;gap:4px;margin-left:12px}
  .tab{padding:7px 15px;border-radius:8px;cursor:pointer;color:var(--text2);font-size:13px;font-weight:500;transition:all .15s}
  .tab:hover{background:var(--accent-soft);color:var(--text)}
  .tab.active{background:var(--accent-soft);color:var(--accent);font-weight:600}
  .grow{flex:1}
  .btn{padding:7px 14px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);cursor:pointer;font-size:13px;font-weight:500;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
  .btn:hover{background:var(--bg3)}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn.primary:hover{background:var(--accent-hover)}
  .btn.danger{color:var(--danger);border-color:var(--danger-soft)}
  .btn.danger:hover{background:var(--danger-soft)}
  .btn.sm{padding:5px 10px;font-size:12px}
  .btn:disabled{opacity:.5;cursor:not-allowed}

  .body{flex:1;overflow-y:auto;padding:20px}
  .page{display:none}
  .page.on{display:block}
  .card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:14px;overflow:hidden}
  .card-h{padding:12px 16px;border-bottom:1px solid var(--border);font-weight:600;font-size:13px;display:flex;align-items:center;justify-content:space-between;gap:10px}
  .card-b{padding:16px}
  .muted{color:var(--text3);font-size:12px}

  .app{display:flex;align-items:center;gap:14px;padding:14px 16px;border-bottom:1px solid var(--border)}
  .app:last-child{border-bottom:none}
  .app-main{flex:1;min-width:0}
  .app-name{font-weight:600;font-size:14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .app-desc{color:var(--text2);font-size:12px;margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .badge{font-size:11px;font-weight:600;padding:1px 8px;border-radius:20px;background:var(--bg3);color:var(--text2)}
  .badge.ver{background:var(--accent-soft);color:var(--accent)}
  .badge.cmd{background:var(--success-soft);color:var(--success)}
  .app-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}

  .switch{position:relative;display:inline-block;width:40px;height:22px;flex-shrink:0}
  .switch input{opacity:0;width:0;height:0}
  .slider{position:absolute;inset:0;background:#cbd5e1;border-radius:22px;cursor:pointer;transition:.2s}
  .slider:before{content:"";position:absolute;height:16px;width:16px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s}
  .switch input:checked+.slider{background:var(--success)}
  .switch input:checked+.slider:before{transform:translateX(18px)}

  input[type=text],input[type=url],textarea,select{width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:8px;font-size:13px;background:var(--bg);color:var(--text);font-family:inherit}
  input:focus,textarea:focus,select:focus{outline:none;border-color:var(--accent)}
  label.fld{display:block;margin-bottom:14px}
  label.fld .k{font-weight:600;font-size:13px;margin-bottom:5px;display:block}
  label.fld .d{color:var(--text3);font-size:11px;margin-bottom:6px;display:block}
  .row{display:flex;gap:10px;align-items:center}

  table.cmds{width:100%;border-collapse:collapse;font-size:12.5px}
  table.cmds th,table.cmds td{text-align:left;padding:8px 10px;border-bottom:1px solid var(--border)}
  table.cmds th{color:var(--text3);font-weight:600;position:sticky;top:0;background:var(--bg)}
  table.cmds code{background:var(--bg3);padding:1px 6px;border-radius:5px;font-size:12px}

  .logbox{background:#0f172a;color:#e2e8f0;border-radius:8px;padding:12px;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12px;line-height:1.6;height:calc(100vh - 220px);overflow-y:auto;white-space:pre-wrap;word-break:break-all}
  .log-INFO{color:#93c5fd}.log-WARNING{color:#fbbf24}.log-ERROR{color:#f87171}.log-DEBUG{color:#94a3b8}
  .log-t{color:#64748b;margin-right:8px}

  .empty{text-align:center;color:var(--text3);padding:44px 16px;font-size:13px}
  .empty svg{width:42px;height:42px;opacity:.4;margin-bottom:10px}

  .modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.45);display:none;align-items:center;justify-content:center;z-index:50;padding:20px}
  .modal-bg.on{display:flex}
  .modal{background:var(--bg);border-radius:14px;box-shadow:var(--shadow-md);width:100%;max-width:560px;max-height:86vh;display:flex;flex-direction:column;overflow:hidden}
  .modal-h{padding:14px 18px;border-bottom:1px solid var(--border);font-weight:700;display:flex;justify-content:space-between;align-items:center}
  .modal-b{padding:18px;overflow-y:auto}
  .modal-f{padding:12px 18px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
  .x{cursor:pointer;color:var(--text3);font-size:20px;line-height:1;background:none;border:none}

  #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#1e293b;color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;opacity:0;transition:all .25s;z-index:100;pointer-events:none;max-width:80vw}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  #toast.success{background:var(--success)}#toast.error{background:var(--danger)}
</style>
</head>
<body>
<div class="page-wrap">
  <div class="topbar">
    <div class="logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg></div>
    <div class="brand">AstrBot 基座<small>OneBot · 插件管理面板</small></div>
    <div class="tabs">
      <div class="tab active" data-page="installed" onclick="go('installed')">已安装</div>
      <div class="tab" data-page="install" onclick="go('install')">安装插件</div>
      <div class="tab" data-page="commands" onclick="go('commands')">指令正则</div>
      <div class="tab" data-page="logs" onclick="go('logs')">日志</div>
    </div>
    <div class="grow"></div>
    <button class="btn sm" onclick="reloadBase()" id="reloadBtn">热重载</button>
  </div>

  <div class="body">
    <!-- 已安装 -->
    <div class="page on" id="page-installed">
      <div class="card">
        <div class="card-h"><span>已安装插件</span><span class="muted" id="appCount"></span></div>
        <div id="appList"><div class="empty">加载中…</div></div>
      </div>
    </div>

    <!-- 安装 -->
    <div class="page" id="page-install">
      <div class="card">
        <div class="card-h"><span>下载镜像 (GitHub 加速)</span><span class="muted" id="mirrorHint"></span></div>
        <div class="card-b">
          <label class="fld">
            <span class="k">镜像源</span>
            <span class="d">国内直连 GitHub 慢/超时时选镜像; 「自动」按测速排名多镜像兜底。设为默认后所有安装都走此镜像。</span>
            <div class="row">
              <select id="mirrorSel"></select>
              <button class="btn sm" onclick="saveMirror()">设为默认</button>
            </div>
          </label>
        </div>
      </div>
      <div class="card">
        <div class="card-h">从 Git 仓库 / 直链安装</div>
        <div class="card-b">
          <label class="fld">
            <span class="k">仓库地址或 zip 直链</span>
            <span class="d">支持 GitHub 仓库 URL (https://github.com/用户/仓库) 或 .zip 直链</span>
            <input type="url" id="instUrl" placeholder="https://github.com/owner/astrbot_plugin_xxx">
          </label>
          <label class="fld">
            <span class="k">目录名 (可选)</span>
            <span class="d">留空则自动推断; 装入 apps/&lt;目录名&gt;/</span>
            <input type="text" id="instName" placeholder="astrbot_plugin_xxx">
          </label>
          <button class="btn primary" onclick="installUrl()" id="instBtn">下载并安装</button>
        </div>
      </div>
      <div class="card">
        <div class="card-h">上传 zip 安装</div>
        <div class="card-b">
          <div class="row">
            <input type="file" id="instFile" accept=".zip">
            <button class="btn primary" onclick="installFile()" id="instFileBtn">上传安装</button>
          </div>
          <p class="muted" style="margin-top:10px">zip 内需含 AstrBot 插件的 main.py (支持单层根目录包裹)。</p>
        </div>
      </div>
    </div>

    <!-- 指令 -->
    <div class="page" id="page-commands">
      <div class="card">
        <div class="card-h"><span>已注册指令 / 正则</span><span class="muted" id="cmdCount"></span></div>
        <div class="card-b" style="padding:0;max-height:calc(100vh - 200px);overflow:auto">
          <table class="cmds"><thead><tr><th>插件</th><th>指令</th><th>匹配正则</th></tr></thead>
          <tbody id="cmdBody"></tbody></table>
        </div>
      </div>
    </div>

    <!-- 日志 -->
    <div class="page" id="page-logs">
      <div class="card">
        <div class="card-h"><span>基座日志</span>
          <span class="row">
            <label class="row" style="gap:5px;font-size:12px;font-weight:500"><input type="checkbox" id="logAuto" checked style="width:auto"> 自动刷新</label>
            <button class="btn sm" onclick="clearLogs()">清空</button>
          </span>
        </div>
        <div class="card-b"><div class="logbox" id="logBox"></div></div>
      </div>
    </div>
  </div>
</div>

<!-- 配置弹窗 -->
<div class="modal-bg" id="cfgModal">
  <div class="modal">
    <div class="modal-h"><span id="cfgTitle">插件配置</span><button class="x" onclick="closeCfg()">&times;</button></div>
    <div class="modal-b" id="cfgBody"></div>
    <div class="modal-f"><button class="btn" onclick="closeCfg()">取消</button><button class="btn primary" onclick="saveCfg()" id="cfgSave">保存</button></div>
  </div>
</div>

<!-- 前缀弹窗 -->
<div class="modal-bg" id="pfxModal">
  <div class="modal" style="max-width:420px">
    <div class="modal-h"><span id="pfxTitle">指令前缀</span><button class="x" onclick="closePfx()">&times;</button></div>
    <div class="modal-b">
      <label class="fld">
        <span class="k">指令前缀</span>
        <span class="d">该插件所有指令加此前缀触发 (如 <code>/</code>、<code>#</code>); 留空为无前缀</span>
        <input type="text" id="pfxInput" placeholder="例如 /">
      </label>
    </div>
    <div class="modal-f"><button class="btn" onclick="closePfx()">取消</button><button class="btn primary" onclick="savePfx()">保存</button></div>
  </div>
</div>

<div id="toast"></div>

<script>
const qs = new URLSearchParams(location.search);
const TOKEN = qs.get('token') || '';
const _bm = location.pathname.match(/^(.*)\/api\/web-pages\//);
const API = (_bm ? _bm[1] : '') + '/api/ext/astrbot_base';

let PAGE = 'installed';
let APPS = [];
let CFG_APP = '', PFX_APP = '';
let logSeq = 0, logTimer = null;

function toast(m, kind){
  const t=document.getElementById('toast');
  t.textContent=m; t.className=''; if(kind)t.classList.add(kind);
  void t.offsetWidth; t.classList.add('show');
  clearTimeout(t._tm); t._tm=setTimeout(()=>t.classList.remove('show'),2800);
}
function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

async function api(path, method, body){
  const m = method||'GET';
  const url = API+path+(m==='GET'?((path.includes('?')?'&':'?')+'token='+encodeURIComponent(TOKEN)):'');
  try{
    const r = await fetch(url, {method:m, headers:{'Content-Type':'application/json','Authorization':'Bearer '+TOKEN}, body: body?JSON.stringify(body):undefined});
    return await r.json();
  }catch(e){ return {success:false, message:'网络错误: '+e}; }
}

function go(p){
  PAGE=p;
  document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x.dataset.page===p));
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('on'));
  document.getElementById('page-'+p).classList.add('on');
  if(p==='installed') loadApps();
  if(p==='install') loadMirror();
  if(p==='commands') loadCommands();
  if(p==='logs'){ loadLogs(true); startLogAuto(); } else { stopLogAuto(); }
}

/* ===== 镜像 ===== */
let MIRROR_LOADED=false;
async function loadMirror(){
  if(MIRROR_LOADED)return; MIRROR_LOADED=true;
  const r=await api('/mirror');
  const sel=document.getElementById('mirrorSel');
  if(!r.success){ sel.innerHTML='<option value="">自动</option>'; return; }
  sel.innerHTML=(r.choices||[]).map(c=>`<option value="${esc(c.value)}">${esc(c.label)}</option>`).join('');
  sel.value=r.mirror||'';
}
async function saveMirror(){
  const mirror=document.getElementById('mirrorSel').value;
  const r=await api('/mirror','POST',{mirror});
  toast(r.message||'', r.success?'success':'error');
}

/* ===== 已安装 ===== */
async function loadApps(){
  const box=document.getElementById('appList');
  const r=await api('/list');
  if(!r.success){ box.innerHTML='<div class="empty">加载失败: '+esc(r.message||r.error||'')+'</div>'; return; }
  APPS=r.apps||[];
  document.getElementById('appCount').textContent=APPS.length+' 个';
  if(!APPS.length){
    box.innerHTML='<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg><div>出厂未带插件</div><div style="margin-top:6px">到「安装插件」页从 GitHub 或 zip 安装 AstrBot 插件</div></div>';
    return;
  }
  box.innerHTML=APPS.map(a=>{
    const cfgBtn=a.has_schema?`<button class="btn sm" onclick="openCfg('${esc(a.name)}')">配置</button>`:'';
    return `<div class="app">
      <div class="app-main">
        <div class="app-name">${esc(a.display_name)}
          ${a.version?`<span class="badge ver">v${esc(a.version)}</span>`:''}
          <span class="badge cmd">${a.command_count} 指令</span>
          ${a.prefix?`<span class="badge">前缀 ${esc(a.prefix)}</span>`:''}
        </div>
        <div class="app-desc">${esc(a.desc||a.name)}</div>
      </div>
      <div class="app-actions">
        <label class="switch"><input type="checkbox" ${a.enabled?'checked':''} onchange="toggleApp('${esc(a.name)}',this.checked)"><span class="slider"></span></label>
        <button class="btn sm" onclick="openPfx('${esc(a.name)}','${esc(a.prefix||'')}')">前缀</button>
        ${cfgBtn}
        <button class="btn sm danger" onclick="uninstall('${esc(a.name)}')">卸载</button>
      </div>
    </div>`;
  }).join('');
}

async function toggleApp(name,enabled){
  const r=await api('/toggle','POST',{name,enabled});
  toast(r.message||(r.success?'已更新':'失败'), r.success?'success':'error');
  loadApps();
}

async function uninstall(name){
  if(!confirm('确定卸载插件 '+name+' ? 该操作会删除 apps/'+name+' 目录。'))return;
  const r=await api('/uninstall','POST',{name});
  toast(r.message||'', r.success?'success':'error');
  loadApps();
}

/* ===== 安装 ===== */
async function installUrl(){
  const url=document.getElementById('instUrl').value.trim();
  const name=document.getElementById('instName').value.trim();
  if(!url){ toast('请填写地址','error'); return; }
  const mirror=document.getElementById('mirrorSel').value;
  const btn=document.getElementById('instBtn'); btn.disabled=true; btn.textContent='安装中…';
  const r=await api('/install','POST',{url,name,mirror});
  btn.disabled=false; btn.textContent='下载并安装';
  toast(r.message||'', r.success?'success':'error');
  if(r.success){ document.getElementById('instUrl').value=''; document.getElementById('instName').value=''; go('installed'); }
}

async function installFile(){
  const f=document.getElementById('instFile').files[0];
  if(!f){ toast('请选择 zip 文件','error'); return; }
  const btn=document.getElementById('instFileBtn'); btn.disabled=true; btn.textContent='上传中…';
  const fd=new FormData(); fd.append('file',f); fd.append('name',f.name.replace(/\.zip$/i,''));
  try{
    const r=await fetch(API+'/install?token='+encodeURIComponent(TOKEN),{method:'POST',headers:{'Authorization':'Bearer '+TOKEN},body:fd});
    const j=await r.json();
    toast(j.message||'', j.success?'success':'error');
    if(j.success){ document.getElementById('instFile').value=''; go('installed'); }
  }catch(e){ toast('上传失败: '+e,'error'); }
  btn.disabled=false; btn.textContent='上传安装';
}

/* ===== 指令 ===== */
async function loadCommands(){
  const r=await api('/commands');
  const body=document.getElementById('cmdBody');
  const cmds=(r.commands||[]);
  document.getElementById('cmdCount').textContent=cmds.length+' 条';
  if(!cmds.length){ body.innerHTML='<tr><td colspan="3" class="empty">暂无 (装插件后自动注册)</td></tr>'; return; }
  body.innerHTML=cmds.map(c=>`<tr><td><span class="badge">${esc(c.app)}</span></td><td>${esc(c.command)}</td><td><code>${esc(c.pattern)}</code></td></tr>`).join('');
}

/* ===== 配置 ===== */
let CFG_FIELDS=[];
async function openCfg(name){
  CFG_APP=name;
  const r=await api('/config?app='+encodeURIComponent(name));
  if(!r.success){ toast(r.message||'读取配置失败','error'); return; }
  CFG_FIELDS=r.fields||[];
  document.getElementById('cfgTitle').textContent=name+' · 配置';
  const b=document.getElementById('cfgBody');
  if(!CFG_FIELDS.length){ b.innerHTML='<div class="empty">该插件无 _conf_schema.json 配置项</div>'; }
  else b.innerHTML=CFG_FIELDS.map((f,i)=>renderField(f,i)).join('');
  document.getElementById('cfgModal').classList.add('on');
}
function renderField(f,i){
  const t=(f.type||'string').toLowerCase();
  let ctrl;
  if(t==='bool'||t==='boolean') ctrl=`<label class="switch"><input type="checkbox" id="cf${i}" ${f.value?'checked':''}><span class="slider"></span></label>`;
  else if(t==='int'||t==='float') ctrl=`<input type="text" id="cf${i}" value="${esc(f.value)}">`;
  else if(t==='object'||t==='list') ctrl=`<textarea id="cf${i}" rows="4">${esc(typeof f.value==='string'?f.value:JSON.stringify(f.value,null,2))}</textarea>`;
  else ctrl=`<input type="text" id="cf${i}" value="${esc(f.value)}">`;
  return `<label class="fld"><span class="k">${esc(f.description||f.key)}</span>${f.hint?`<span class="d">${esc(f.hint)}</span>`:''}${ctrl}</label>`;
}
async function saveCfg(){
  const values={};
  CFG_FIELDS.forEach((f,i)=>{
    const el=document.getElementById('cf'+i); if(!el)return;
    const t=(f.type||'string').toLowerCase();
    if(t==='bool'||t==='boolean') values[f.key]=el.checked;
    else if(t==='int') values[f.key]=parseInt(el.value,10);
    else if(t==='float') values[f.key]=parseFloat(el.value);
    else if(t==='object'||t==='list'){ try{ values[f.key]=JSON.parse(el.value); }catch(e){ values[f.key]=el.value; } }
    else values[f.key]=el.value;
  });
  const btn=document.getElementById('cfgSave'); btn.disabled=true; btn.textContent='保存中…';
  const r=await api('/config','POST',{app:CFG_APP,values});
  btn.disabled=false; btn.textContent='保存';
  toast(r.message||'', r.success?'success':'error');
  if(r.success){ closeCfg(); loadApps(); }
}
function closeCfg(){ document.getElementById('cfgModal').classList.remove('on'); }

/* ===== 前缀 ===== */
function openPfx(name,prefix){
  PFX_APP=name;
  document.getElementById('pfxTitle').textContent=name+' · 指令前缀';
  document.getElementById('pfxInput').value=prefix||'';
  document.getElementById('pfxModal').classList.add('on');
}
async function savePfx(){
  const prefix=document.getElementById('pfxInput').value;
  const r=await api('/prefix','POST',{name:PFX_APP,prefix});
  toast(r.message||'', r.success?'success':'error');
  if(r.success){ closePfx(); loadApps(); }
}
function closePfx(){ document.getElementById('pfxModal').classList.remove('on'); }

/* ===== 日志 ===== */
async function loadLogs(reset){
  if(reset){ logSeq=0; document.getElementById('logBox').innerHTML=''; }
  const r=await api('/logs?after='+logSeq);
  if(!r.success)return;
  const box=document.getElementById('logBox');
  (r.logs||[]).forEach(e=>{
    logSeq=e.seq;
    const div=document.createElement('div');
    div.innerHTML=`<span class="log-t">${esc(e.time)}</span><span class="log-${esc(e.level)}">[${esc(e.level)}]</span> ${esc(e.msg)}`;
    box.appendChild(div);
  });
  if(r.logs&&r.logs.length) box.scrollTop=box.scrollHeight;
}
function startLogAuto(){ stopLogAuto(); logTimer=setInterval(()=>{ if(document.getElementById('logAuto').checked) loadLogs(false); },2000); }
function stopLogAuto(){ if(logTimer){ clearInterval(logTimer); logTimer=null; } }
async function clearLogs(){ await api('/clear-logs','POST',{}); loadLogs(true); toast('已清空','success'); }

/* ===== 通用 ===== */
async function reloadBase(){
  const btn=document.getElementById('reloadBtn'); btn.disabled=true; btn.textContent='重载中…';
  const r=await api('/reload','POST',{});
  btn.disabled=false; btn.textContent='热重载';
  toast(r.message||'', r.success?'success':'error');
  if(PAGE==='installed')loadApps(); if(PAGE==='commands')loadCommands();
}

loadApps();
</script>
