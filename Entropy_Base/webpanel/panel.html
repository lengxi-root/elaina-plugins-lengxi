<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>熵增基座</title>
<style>
  :root{
    --bg:#ffffff; --bg2:#f8f9fa; --bg3:#f1f5f9; --bg-float:#ffffff;
    --text:#1e293b; --text2:#475569; --text3:#94a3b8;
    --border:#e2e8f0; --border2:rgba(0,0,0,.05);
    --accent:#5865f2; --accent-hover:#4752c4; --accent-light:#7289da;
    --success:#10b981; --danger:#ef4444; --warning:#f59e0b; --info:#06b6d4;
    --radius:12px; --radius-sm:8px; --radius-lg:16px;
    --sidebar-bg:#f1f5f9;
    --accent-soft:color-mix(in srgb,var(--accent) 12%,transparent);
    --accent-line:color-mix(in srgb,var(--accent) 30%,transparent);
    --success-soft:color-mix(in srgb,var(--success) 16%,transparent);
    --danger-soft:color-mix(in srgb,var(--danger) 16%,transparent);
    --warning-soft:color-mix(in srgb,var(--warning) 18%,transparent);
    --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
    --shadow-md:0 4px 16px rgba(0,0,0,.08);
    --shadow-lg:0 12px 32px rgba(0,0,0,.14);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--bg2); color:var(--text); font-size:14px; line-height:1.5;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue","PingFang SC","Microsoft YaHei",Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:rgba(100,116,139,.35);border-radius:4px}

  /* ===== 整体: 左侧栏 + 右主区 (人工审核风格) ===== */
  .eb-page{height:100vh;display:flex;background:var(--bg2);overflow:hidden}
  .eb-sidebar{width:220px;background:var(--sidebar-bg);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:width .25s}
  .eb-sidebar.collapsed{width:56px}
  .eb-sidebar.collapsed .nav-label,.eb-sidebar.collapsed .side-title,.eb-sidebar.collapsed .nav-badge{display:none}
  .eb-sidebar.collapsed .nav-item{justify-content:center;padding:10px}
  .eb-sidebar.collapsed .side-brand .logo{margin:0}
  .side-header{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px}
  .side-brand{display:flex;align-items:center;gap:10px;min-width:0}
  .logo{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--accent),var(--accent-light));color:#fff;flex-shrink:0;box-shadow:0 4px 12px var(--accent-soft)}
  .logo svg{width:17px;height:17px}
  .side-title{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .collapse-btn{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;color:var(--text2)}
  .collapse-btn:hover{background:var(--border)}
  .collapse-btn svg{width:14px;height:14px;transition:transform .25s}
  .eb-sidebar.collapsed .collapse-btn svg{transform:rotate(180deg)}
  .eb-nav{flex:1;overflow-y:auto;padding:8px}
  .nav-item{display:flex;align-items:center;gap:10px;padding:9px 14px;border-radius:8px;cursor:pointer;transition:all .15s;color:var(--text2);font-size:13px;margin-bottom:2px;font-weight:500}
  .nav-item:hover{background:var(--accent-soft);color:var(--text)}
  .nav-item.active{background:var(--accent-soft);color:var(--accent);font-weight:600}
  .nav-item svg{width:18px;height:18px;flex-shrink:0;stroke-width:1.8}
  .nav-label{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .nav-badge{font-size:11px;font-weight:700;background:var(--accent-soft);color:var(--accent);border-radius:20px;padding:1px 7px;min-width:20px;text-align:center}
  .nav-divider{height:1px;background:var(--border);margin:6px 10px}

  .eb-main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
  .eb-header{padding:13px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px;background:var(--bg)}
  .eb-header h1{font-size:16px;font-weight:700}
  .header-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
  .eb-content{flex:1;overflow-y:auto;padding:22px}

  .btn{padding:8px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg);color:var(--text);font-weight:600;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .15s;text-decoration:none}
  .btn:hover:not(:disabled){border-color:var(--accent-line)}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .btn-pri{background:var(--accent);color:#fff;border-color:transparent}
  .btn-pri:hover:not(:disabled){background:var(--accent-hover)}
  .btn-danger{background:var(--danger-soft);color:var(--danger);border-color:transparent}
  .btn svg{width:15px;height:15px}

  .page{display:none}
  .page.on{display:block}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
  .card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:10px}
  .card:hover{box-shadow:var(--shadow-md);border-color:var(--accent-line)}
  .card .nm{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .card .ver{font-size:11px;font-weight:700;color:var(--accent);background:var(--accent-soft);border-radius:20px;padding:1px 8px}
  .card .sub{font-size:12px;color:var(--text3);font-family:ui-monospace,Menlo,Consolas,monospace}
  .card .desc{font-size:13px;color:var(--text2);min-height:38px}
  .card .acts{display:flex;gap:8px;flex-wrap:wrap;margin-top:auto}
  .pill{font-size:11px;font-weight:700;border-radius:20px;padding:1px 8px}
  .pill.ok{background:var(--success-soft);color:var(--success)}
  .pill.up{background:var(--warning-soft);color:var(--warning)}
  .pill.off{background:var(--border);color:var(--text3)}
  .card.disabled{opacity:.6}
  .card.disabled .desc,.card.disabled .sub{filter:grayscale(1)}

  table{width:100%;border-collapse:collapse;background:var(--bg);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
  th,td{text-align:left;padding:10px 12px;border-bottom:1px solid var(--border2);font-size:13px;vertical-align:top}
  th{background:var(--bg3);color:var(--text2);font-weight:700;position:sticky;top:0}
  td.mono,code{font-family:ui-monospace,Menlo,Consolas,monospace}
  code{background:var(--bg3);padding:2px 6px;border-radius:6px;font-size:12px;word-break:break-all}
  tr:hover td{background:var(--accent-soft)}

  .empty{text-align:center;padding:48px 20px;color:var(--text3)}
  .empty svg{width:46px;height:46px;opacity:.4;margin-bottom:10px}
  .loading{text-align:center;padding:48px 20px;color:var(--text3)}
  .spinner{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 14px}
  @keyframes spin{to{transform:rotate(360deg)}}

  .bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px}
  .muted{color:var(--text3);font-size:12px}
  select,input[type=text],input[type=password]{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:13px;padding:7px 10px;outline:none;max-width:100%}
  select:focus,input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}

  /* ===== 设置页 ===== */
  .settings-wrap{max-width:680px}
  .settings-section{font-weight:600;font-size:13px;color:var(--text2);margin:18px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
  .toggle-switch input:disabled+.toggle-track{opacity:.4;cursor:not-allowed}
  .toggle-row{display:flex;align-items:center;gap:14px;padding:14px 16px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);margin-bottom:12px;box-shadow:var(--shadow)}
  .toggle-info{flex:1;min-width:0}
  .toggle-title{font-weight:600;font-size:14px;color:var(--text);margin-bottom:3px}
  .toggle-desc{font-size:12px;color:var(--text3);line-height:1.5}
  .toggle-switch{position:relative;width:40px;height:22px;cursor:pointer;flex-shrink:0}
  .toggle-switch input{opacity:0;width:0;height:0}
  .toggle-track{position:absolute;inset:0;background:#cbd5e1;border-radius:11px;transition:background .2s}
  .toggle-track::after{content:'';position:absolute;width:16px;height:16px;left:3px;top:3px;background:#fff;border-radius:50%;transition:transform .2s;box-shadow:0 1px 2px rgba(0,0,0,.2)}
  .toggle-switch input:checked+.toggle-track{background:var(--accent)}
  .toggle-switch input:checked+.toggle-track::after{transform:translateX(18px)}
  .setting-select{flex-shrink:0;min-width:200px;max-width:60%;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);font-size:13px;cursor:pointer}
  .setting-select:focus{outline:none;border-color:var(--accent)}

  /* modal */
  .mask{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:50;padding:20px}
  .mask.show{display:flex}
  .modal{background:var(--bg);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);width:min(560px,100%);max-height:86vh;overflow:auto}
  .modal .mh{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg)}
  .modal .mh h3{font-size:15px;font-weight:700}
  .modal .mb{padding:18px}
  .modal .mf{display:flex;justify-content:flex-end;gap:10px;padding:14px 18px;border-top:1px solid var(--border);position:sticky;bottom:0;background:var(--bg)}
  .field{margin-bottom:14px}
  .field label{display:block;font-weight:600;font-size:13px;margin-bottom:4px}
  .field .h{font-size:12px;color:var(--text3);margin-bottom:6px;white-space:pre-wrap}
  .field input[type=text],.field input[type=password]{width:100%}
  .x{cursor:pointer;color:var(--text3);background:none;border:none;font-size:20px;line-height:1}

  #toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(20px);background:var(--text);color:var(--bg);padding:10px 18px;border-radius:var(--radius);font-weight:600;font-size:13px;opacity:0;transition:.25s;z-index:99;pointer-events:none;box-shadow:var(--shadow-lg);max-width:90vw}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  #toast.success{background:var(--success);color:#fff}
  #toast.error{background:var(--danger);color:#fff}

  @media(max-width:768px){.eb-sidebar{width:56px}.side-title,.nav-label,.nav-badge{display:none}.nav-item{justify-content:center;padding:10px}.eb-content{padding:16px}}

  /* ===== 日志页 ===== */
  .log-toolbar{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
  .log-toolbar .muted{flex:1;min-width:120px}
  .log-box{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);
    height:calc(100vh - 210px);min-height:280px;overflow-y:auto;padding:10px 14px;
    font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,"Liberation Mono",monospace;font-size:12.5px;line-height:1.65}
  .log-line{display:flex;gap:10px;padding:1px 0;white-space:pre-wrap;word-break:break-word}
  .log-line .lt{color:var(--text3);flex-shrink:0}
  .log-line .lv{flex-shrink:0;width:48px;font-weight:600}
  .log-line .lm{flex:1;min-width:0;color:var(--text)}
  .log-line.INFO .lv{color:var(--accent)}
  .log-line.WARNING .lv{color:var(--warning)}
  .log-line.ERROR .lv,.log-line.CRITICAL .lv{color:var(--danger)}
  .log-line.DEBUG{opacity:.65}
  .chk{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text2);cursor:pointer;user-select:none}
</style>
<script>
  /* 主题跟随后台 (同源 iframe): 读取父页面 CSS 变量。 */
  (function(){
    var VARS=['--bg','--bg2','--bg3','--bg-float','--text','--text2','--text3',
      '--border','--accent','--accent-hover','--accent-light','--sidebar-bg',
      '--success','--danger','--warning','--info','--radius','--radius-sm','--radius-lg'];
    function sync(){
      try{
        if(!window.parent||window.parent===window)return;
        var pcs=getComputedStyle(window.parent.document.documentElement);
        var st=document.documentElement.style;
        VARS.forEach(function(v){var val=pcs.getPropertyValue(v).trim();if(val)st.setProperty(v,val);});
      }catch(e){}
    }
    sync(); setInterval(sync,1200);
  })();
</script>
</head>
<body>
<div class="eb-page">
  <!-- 左侧导航 -->
  <div class="eb-sidebar" id="eb-sidebar">
    <div class="side-header">
      <div class="side-brand">
        <span class="logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg></span>
        <span class="side-title">熵增基座</span>
      </div>
      <button class="collapse-btn" onclick="document.getElementById('eb-sidebar').classList.toggle('collapsed')" title="收起/展开"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="11 17 6 12 11 7"/><polyline points="18 17 13 12 18 7"/></svg></button>
    </div>
    <div class="eb-nav">
      <div class="nav-item active" data-page="installed" onclick="go('installed')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg><span class="nav-label">已安装</span><span class="nav-badge" id="b-installed">0</span></div>
      <div class="nav-item" data-page="catalog" onclick="go('catalog')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg><span class="nav-label">插件库</span><span class="nav-badge" id="b-catalog">0</span></div>
      <div class="nav-item" data-page="commands" onclick="go('commands')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg><span class="nav-label">指令正则</span><span class="nav-badge" id="b-commands">0</span></div>
      <div class="nav-divider"></div>
      <div class="nav-item" data-page="settings" onclick="go('settings')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg><span class="nav-label">基座设置</span></div>
      <div class="nav-item" data-page="logs" onclick="go('logs')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="16" y2="17"/><line x1="8" y1="9" x2="10" y2="9"/></svg><span class="nav-label">日志</span></div>
    </div>
  </div>

  <!-- 右侧主区 -->
  <div class="eb-main">
    <div class="eb-header">
      <h1 id="page-title">已安装</h1>
      <div class="header-right">
        <button class="btn" onclick="openMirror()" title="GitHub 下载镜像"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>镜像</button>
        <button class="btn" onclick="refreshAll()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>刷新</button>
        <button class="btn btn-pri" onclick="reloadBase()" title="重新注册基座指令">重载基座</button>
      </div>
    </div>
    <div class="eb-content">
      <!-- 已安装 -->
      <div class="page on" id="page-installed"><div id="installed-body"></div></div>

      <!-- 插件库 -->
      <div class="page" id="page-catalog">
        <div class="bar">
          <span class="muted" id="org-tip"></span>
          <span style="flex:1"></span>
          <button class="btn" onclick="checkUpdates()">检查更新</button>
        </div>
        <div id="catalog-body"></div>
      </div>

      <!-- 指令正则 -->
      <div class="page" id="page-commands">
        <div class="muted" style="margin-bottom:12px">基座当前已注册到框架的指令与匹配正则 (装/卸插件后会自动重载刷新)。</div>
        <div id="commands-body"></div>
      </div>

      <!-- 基座设置 -->
      <div class="page" id="page-settings">
        <div class="settings-wrap" id="settings-body"><div class="loading"><div class="spinner"></div>加载设置…</div></div>
      </div>

      <!-- 日志 -->
      <div class="page" id="page-logs">
        <div class="log-toolbar">
          <span class="muted">实时显示安装 / 卸载 / 依赖安装 / 缺少依赖等基座日志 (自动刷新)。</span>
          <label class="chk"><input type="checkbox" id="log-auto" checked onchange="toggleLogAuto()">自动刷新</label>
          <button class="btn" onclick="loadLogs(true)">刷新</button>
          <button class="btn btn-danger" onclick="clearLogs()">清空</button>
        </div>
        <div class="log-box" id="log-box"><div class="loading"><div class="spinner"></div>加载日志…</div></div>
      </div>
    </div>
  </div>
</div>

<!-- 配置弹窗 -->
<div class="mask" id="cfg-mask">
  <div class="modal">
    <div class="mh"><h3 id="cfg-title">插件配置</h3><button class="x" onclick="closeCfg()">&times;</button></div>
    <div class="mb" id="cfg-body"></div>
    <div class="mf"><button class="btn" onclick="closeCfg()">取消</button><button class="btn btn-pri" id="cfg-save" onclick="saveCfg()">保存并重载</button></div>
  </div>
</div>

<!-- 镜像弹窗 -->
<div class="mask" id="mirror-mask">
  <div class="modal">
    <div class="mh"><h3>GitHub 下载镜像</h3><button class="x" onclick="closeMirror()">&times;</button></div>
    <div class="mb">
      <div class="field">
        <label>当前镜像 (留空 = 自动按延迟优选)</label>

      <div id="mirror-list" style="margin-top:12px"></div>

<script>
const qs = new URLSearchParams(location.search);
const TOKEN = qs.get('token') || '';
const _bm = location.pathname.match(/^(.*)\/api\/web-pages\//);
const API = (_bm ? _bm[1] : '') + '/api/ext/entropy_base';

const TITLES = {installed:'已安装', catalog:'插件库', commands:'指令正则', settings:'基座设置', logs:'日志'};
let PAGE = 'installed';
let DATA = {installed:[], catalog:[], mirror:'', org:''};
let UPDATES = {};            // name -> {has_update, remote}
let CATALOG_LOADED = false;

function toast(m, kind){
  const t=document.getElementById('toast');
  t.textContent=m; t.className=''; if(kind)t.classList.add(kind);
  void t.offsetWidth; t.classList.add('show');
  clearTimeout(t._tm); t._tm=setTimeout(()=>t.classList.remove('show'),2600);
}
function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

async function api(path, method, body){
  const m = method||'GET';
  const url = API+path+(m==='GET'?((path.includes('?')?'&':'?')+'token='+encodeURIComponent(TOKEN)):'');
  try{
    const r = await fetch(url, {method:m, headers:{'Content-Type':'application/json','Authorization':'Bearer '+TOKEN}, body: body?JSON.stringify(body):undefined});
    return await r.json();
  }catch(e){ return {success:false, message:'网络错误: '+e}; }
}

function go(p){
  PAGE=p;
  document.querySelectorAll('.nav-item').forEach(x=>x.classList.toggle('active',x.dataset.page===p));
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('on'));
  document.getElementById('page-'+p).classList.add('on');
  document.getElementById('page-title').textContent = TITLES[p]||'';
  if(p==='catalog' && !CATALOG_LOADED) loadCatalog();
  if(p==='commands') loadCommands();
  if(p==='settings') loadSettings();
  if(p==='logs'){ loadLogs(true); startLogAuto(); } else { stopLogAuto(); }
}

/* ===== 日志 ===== */
let LOG_SEQ = 0;
let LOG_TIMER = null;
function logLineHtml(e){
  const lv=(e.level||'INFO');
  return `<div class="log-line ${esc(lv)}"><span class="lt">${esc(e.time||'')}</span><span class="lv">${esc(lv)}</span><span class="lm">${esc(e.msg||'')}</span></div>`;
}
async function loadLogs(reset){
  const box=document.getElementById('log-box');
  if(reset){ LOG_SEQ=0; }
  const d = await api('/logs'+(LOG_SEQ?('?since='+LOG_SEQ):''));
  if(!d||!d.success){ if(reset) box.innerHTML='<div class="empty">日志加载失败</div>'; return; }
  const logs = d.logs||[];
  if(reset){
    box.innerHTML = logs.length ? logs.map(logLineHtml).join('') : '<div class="empty">暂无日志<div class="muted">安装/卸载插件后这里会显示过程日志</div></div>';
  }else if(logs.length){
    if(LOG_SEQ===0){ box.innerHTML=''; }
    const stick = box.scrollTop+box.clientHeight >= box.scrollHeight-30;
    box.insertAdjacentHTML('beforeend', logs.map(logLineHtml).join(''));
    if(stick) box.scrollTop = box.scrollHeight;
  }
  if(typeof d.seq==='number') LOG_SEQ=d.seq;
  if(reset) box.scrollTop = box.scrollHeight;
}
function startLogAuto(){
  stopLogAuto();
  if(document.getElementById('log-auto') && document.getElementById('log-auto').checked){
    LOG_TIMER=setInterval(()=>{ if(PAGE==='logs') loadLogs(false); }, 3000);
  }
}
function stopLogAuto(){ if(LOG_TIMER){ clearInterval(LOG_TIMER); LOG_TIMER=null; } }
function toggleLogAuto(){ startLogAuto(); }
async function clearLogs(){
  if(!confirm('清空日志显示?')) return;
  await api('/clear-logs','POST',{});
  LOG_SEQ=0;
  document.getElementById('log-box').innerHTML='<div class="empty">已清空</div>';
}

/* /list: 仅本地数据, 立即返回; 插件库走 /catalog 异步加载 (互不阻塞) */
async function loadList(){
  const d = await api('/list');
  if(!d.success){ toast(d.message||'加载失败','error'); return; }
  DATA.installed = d.installed||[];
  DATA.mirror = d.mirror||'';
  DATA.org = d.org||'';
  document.getElementById('org-tip').textContent = '来源: github.com/'+(d.org||'')+' (astrbot_plugin_* 仓库)';
  document.getElementById('mirror-input').value = d.mirror||'';
  renderInstalled();
}

async function loadCatalog(force){
  if(CATALOG_LOADED && !force) return;
  document.getElementById('catalog-body').innerHTML='<div class="loading"><div class="spinner"></div>正在从 GitHub 拉取插件清单…</div>';
  const d = await api('/catalog');
  DATA.catalog = (d&&d.catalog)||[];
  CATALOG_LOADED = true;
  if(d&&d.org) DATA.org=d.org;
  renderCatalog();
}

function refreshAll(){
  CATALOG_LOADED=false; UPDATES={};
  loadList();
  loadCatalog(true);
  if(PAGE==='commands') loadCommands();
  if(PAGE==='settings') loadSettings();
  toast('已刷新');
}

function renderInstalled(){
  document.getElementById('b-installed').textContent = DATA.installed.length;
  const el=document.getElementById('installed-body');
  if(!DATA.installed.length){
    el.innerHTML='<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg><div>暂无已安装插件</div><div class="muted">到「插件库」选择并下载</div></div>';
    return;
  }
  el.innerHTML='<div class="grid">'+DATA.installed.map(a=>{
    const up = UPDATES[a.name];
    const upPill = up&&up.has_update ? `<span class="pill up">可更新 → ${esc(up.remote)}</span>` : '';
    const enabled = a.enabled!==false;
    const offPill = enabled ? '' : '<span class="pill off">已停用</span>';
    return `<div class="card${enabled?'':' disabled'}">
      <div class="nm">${esc(a.display_name||a.name)} ${a.version?`<span class="ver">v${esc(a.version)}</span>`:''} ${upPill} ${offPill}</div>
      <div class="sub">${esc(a.name)} · ${a.command_count} 条指令</div>
      <div class="desc">${esc(a.desc||'')}</div>
      <div class="acts">
        <button class="btn ${enabled?'':'btn-pri'}" onclick="toggleApp('${esc(a.name)}',${!enabled})">${enabled?'停用':'启用'}</button>
        <button class="btn" onclick="openCfg('${esc(a.name)}')">配置</button>
        <button class="btn" onclick="install('${esc(a.name)}',true)">更新</button>
        <button class="btn btn-danger" onclick="uninstall('${esc(a.name)}')">卸载</button>
      </div>
    </div>`;
  }).join('')+'</div>';
}

function branchOf(name){const c=(DATA.catalog||[]).find(x=>x.name===name);return c?c.branch:'main';}

function renderCatalog(){
  document.getElementById('b-catalog').textContent = DATA.catalog.length;
  const el=document.getElementById('catalog-body');
  if(!DATA.catalog.length){ el.innerHTML='<div class="empty">未获取到插件清单 (可切换镜像后刷新)</div>'; return; }
  el.innerHTML='<div class="grid">'+DATA.catalog.map(c=>{
    return `<div class="card">
      <div class="nm">${esc(c.name)} ${c.installed?'<span class="pill ok">已安装</span>':''}</div>
      <div class="sub">${esc(c.branch)} 分支</div>
      <div class="desc">${esc(c.description||'')}</div>
      <div class="acts">
        <button class="btn btn-pri" onclick="install('${esc(c.name)}',${c.installed})">${c.installed?'重新下载':'下载安装'}</button>
        <a class="btn" href="${esc(c.repo)}" target="_blank" rel="noopener">仓库</a>
      </div>
    </div>`;
  }).join('')+'</div>';
}

async function loadCommands(){
  const el=document.getElementById('commands-body');
  el.innerHTML='<div class="loading"><div class="spinner"></div>加载中…</div>';
  const d = await api('/commands');
  const cmds = (d&&d.commands)||[];
  document.getElementById('b-commands').textContent = cmds.length;
  if(!cmds.length){ el.innerHTML='<div class="empty">基座当前未注册任何指令<div class="muted">先安装插件, 安装后会自动重载并在此显示正则</div></div>'; return; }
  el.innerHTML='<table><thead><tr><th>插件</th><th>指令</th><th>匹配正则</th><th>说明</th></tr></thead><tbody>'+
    cmds.map(c=>`<tr><td class="mono">${esc(c.app)}</td><td>${esc(c.command)}</td><td><code>${esc(c.pattern)}</code></td><td class="muted">${esc(c.desc||'')}</td></tr>`).join('')+
    '</tbody></table>';
}

/* ===== 基座设置 ===== */
async function loadSettings(){
  const el=document.getElementById('settings-body');
  el.innerHTML='<div class="loading"><div class="spinner"></div>加载设置…</div>';
  const d = await api('/settings');
  const items=(d&&d.settings)||[];
  if(!items.length){ el.innerHTML='<div class="empty">无可配置项</div>'; return; }
  let prevType='';
  el.innerHTML = items.map(s=>{
    let head='';
    if(s.type==='module' && prevType!=='module'){
      head='<div class="settings-section">框架模块 (启用后供基座调用)</div>';
    }
    prevType=s.type;
    let control;
    if(s.type==='select'){
      const opts=(s.options||[]).map(o=>`<option value="${esc(o.value)}" ${String(o.value)===String(s.value)?'selected':''}>${esc(o.label||o.value)}</option>`).join('');
      control=`<select class="setting-select" data-key="${esc(s.key)}" data-type="select" onchange="saveSettings()">${opts}</select>`;
    }else{
      const disabled=(s.type==='module' && s.available===false)?'disabled':'';
      control=`<label class="toggle-switch"><input type="checkbox" data-key="${esc(s.key)}" data-type="${esc(s.type||'bool')}" ${s.value?'checked':''} ${disabled} onchange="saveSettings()"><span class="toggle-track"></span></label>`;
    }
    return head + `<div class="toggle-row">
      <div class="toggle-info">
        <div class="toggle-title">${esc(s.title||s.key)}</div>
        <div class="toggle-desc">${esc(s.desc||'')}</div>
      </div>
      ${control}
    </div>`;
  }).join('') +
    '<div class="muted" style="margin-top:6px">修改后即时保存并热重载基座。</div>';
}

async function saveSettings(){
  const vals={};
  document.querySelectorAll('#settings-body [data-key]').forEach(el=>{
    vals[el.dataset.key] = (el.dataset.type==='select') ? el.value : el.checked;
  });
  const d = await api('/settings','POST',{values:vals});
  toast(d.message||(d.success?'已保存':'失败'), d.success?'success':'error');
}

async function install(name, isUpdate){
  if(!confirm((isUpdate?'重新下载/更新':'下载安装')+' '+name+' ?')) return;
  if(!CATALOG_LOADED){ await loadCatalog(); }
  toast('正在下载 '+name+' …');
  const d = await api('/install','POST',{name, branch:branchOf(name)});
  toast(d.message||(d.success?'完成':'失败'), d.success?'success':'error');
  if(d.success){ await loadList(); await loadCatalog(true); if(PAGE==='commands') loadCommands(); }
}

async function toggleApp(name, enable){
  if(!enable && !confirm('停用 '+name+' ? (功能关闭, 但文件保留, 不卸载)')) return;
  toast((enable?'启用':'停用')+' '+name+' …');
  const d = await api('/toggle','POST',{name, enabled:enable});
  toast(d.message||(d.success?'完成':'失败'), d.success?'success':'error');
  if(d.success){ await loadList(); if(PAGE==='commands') loadCommands(); }
}

async function uninstall(name){
  if(!confirm('确定卸载 '+name+' ? (apps/'+name+' 将被删除)')) return;
  const d = await api('/uninstall','POST',{name});
  toast(d.message||(d.success?'已卸载':'失败'), d.success?'success':'error');
  if(d.success){ await loadList(); await loadCatalog(true); if(PAGE==='commands') loadCommands(); }
}

async function reloadBase(){
  toast('重载中…');
  const d = await api('/reload','POST',{});
  toast(d.message||'完成', d.success?'success':'error');
  await loadList(); if(PAGE==='commands') loadCommands();
}

async function checkUpdates(){
  toast('检查更新中…');
  const d = await api('/check-updates');
  (d.updates||[]).forEach(u=>{ UPDATES[u.name]=u; });
  const n=(d.updates||[]).filter(u=>u.has_update).length;
  toast(n?`${n} 个插件可更新`:'已是最新', 'success');
  renderInstalled();
}

/* ===== 配置弹窗 ===== */
let CFG_NAME='';
async function openCfg(name){
  CFG_NAME=name;
  document.getElementById('cfg-title').textContent=name+' 配置';
  document.getElementById('cfg-body').innerHTML='<div class="muted">加载中…</div>';
  document.getElementById('cfg-mask').classList.add('show');
  const d = await api('/config?name='+encodeURIComponent(name));
  const fields=(d&&d.fields)||[];
  if(!fields.length){ document.getElementById('cfg-body').innerHTML='<div class="muted">该插件没有可配置项</div>'; return; }
  document.getElementById('cfg-body').innerHTML=fields.map(f=>{
    const v=f.value;
    let input;
    if(f.type==='bool'){
      input=`<select data-key="${esc(f.key)}" data-type="bool"><option value="true" ${v?'selected':''}>true</option><option value="false" ${!v?'selected':''}>false</option></select>`;
    }else if(f.type==='int'){
      input=`<input type="text" data-key="${esc(f.key)}" data-type="int" value="${esc(v==null?'':v)}">`;
    }else if(f.type==='list'||typeof v==='object'){
      input=`<input type="text" data-key="${esc(f.key)}" data-type="json" value='${esc(JSON.stringify(v==null?(f.default||[]):v))}'>`;
    }else{
      const pw=/key|token|secret|密钥|密码/i.test(f.key+f.description);
      input=`<input type="${pw?'password':'text'}" data-key="${esc(f.key)}" data-type="string" value="${esc(v==null?'':v)}">`;
    }
    return `<div class="field"><label>${esc(f.description||f.key)} <span class="muted">(${esc(f.key)})</span></label>${f.hint?`<div class="h">${esc(f.hint)}</div>`:''}${input}</div>`;
  }).join('');
}
function closeCfg(){document.getElementById('cfg-mask').classList.remove('show');}
async function saveCfg(){
  const vals={};
  document.querySelectorAll('#cfg-body [data-key]').forEach(el=>{
    const k=el.dataset.key, t=el.dataset.type; let v=el.value;
    if(t==='bool') v=(v==='true');
    else if(t==='int'){ const n=parseInt(v,10); v=isNaN(n)?0:n; }
    else if(t==='json'){ try{ v=JSON.parse(v); }catch(e){ v=v; } }
    vals[k]=v;
  });
  document.getElementById('cfg-save').disabled=true;
  const d = await api('/config','POST',{name:CFG_NAME, values:vals});
  document.getElementById('cfg-save').disabled=false;
  toast(d.message||(d.success?'已保存':'失败'), d.success?'success':'error');
  if(d.success){ closeCfg(); loadList(); }
}

/* ===== 镜像弹窗 ===== */
function openMirror(){document.getElementById('mirror-input').value=DATA.mirror||'';document.getElementById('mirror-mask').classList.add('show');}
function closeMirror(){document.getElementById('mirror-mask').classList.remove('show');}
async function saveMirror(){
  const m=document.getElementById('mirror-input').value.trim();
  const d=await api('/mirror','POST',{mirror:m});
  toast(d.message||'已保存', d.success?'success':'error');
  if(d.success){ DATA.mirror=m; closeMirror(); }
}
async function testMirrors(){
  document.getElementById('mirror-list').innerHTML='<div class="muted">测速中 (可能需要十几秒)…</div>';
  const d=await api('/test-mirrors','POST',{});
  const ms=(d&&d.mirrors)||[];
  if(!ms.length){ document.getElementById('mirror-list').innerHTML='<div class="muted">无可用镜像</div>'; return; }
  document.getElementById('mirror-list').innerHTML=ms.slice(0,12).map(m=>
    `<div style="display:flex;justify-content:space-between;gap:10px;padding:6px 0;border-bottom:1px solid var(--border2)">
      <code>${esc(m.mirror||'(直连)')}</code>
      <span style="display:flex;gap:8px;align-items:center"><span class="muted">${m.latency!=null?m.latency+'s':''}</span>
      <button class="btn" onclick="pickMirror('${esc(m.mirror||'')}')">选用</button></span>
    </div>`).join('');
}
function pickMirror(m){document.getElementById('mirror-input').value=m;toast('已填入, 点保存生效');}

/* 初始化: 已安装立即加载; 插件库后台异步加载 (不阻塞首屏) */
loadList();
loadCatalog();
</script>
</body>
