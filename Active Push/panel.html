<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>主动推送</title>
<style>
:root{
  --bg:#f5f5f7;--card:#fff;--card2:#fafafa;--text:#1d1d1f;--muted:#8e8e93;
  --text2:#3c3c43;--border:rgba(60,60,67,.12);--border-strong:rgba(60,60,67,.22);
  --accent:#09f;--accent-hover:#008ae6;--accent-soft:rgba(0,153,255,.08);
  --danger:#ff3b30;--shadow:0 4px 16px rgba(31,35,41,.05);
  --shadow-sm:0 1px 2px rgba(0,0,0,.04),0 1px 3px rgba(0,0,0,.06)
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang SC","Helvetica Neue","Microsoft YaHei",sans-serif}
.wrap{width:100%;max-width:1240px;margin:0 auto;padding:36px 40px 56px}
.hero{display:flex;justify-content:space-between;align-items:flex-end;gap:20px;margin-bottom:24px}
.hero h1{font-size:28px;font-weight:700;line-height:1.35;letter-spacing:-.02em;margin:0}
.hero .sub{font-size:13.5px;color:var(--muted);line-height:1.6;margin-top:8px}
.hero-actions{display:flex;align-items:center;gap:8px;flex:none}
.mode-badge{padding:5px 10px;border:1px solid rgba(0,153,255,.18);border-radius:999px;color:var(--accent);font-size:11px;font-weight:700;background:var(--accent-soft);white-space:nowrap}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:18px}
.stat{background:var(--card);border:1px solid transparent;border-radius:14px;padding:18px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow-sm);transition:border-color .18s,box-shadow .18s,transform .18s}
.stat:hover{border-color:var(--border);box-shadow:var(--shadow);transform:translateY(-1px)}
.stat .ic{width:40px;height:40px;border-radius:12px;display:grid;place-items:center;background:var(--card2);border:1px solid var(--border);color:var(--text2);font-size:12px;font-weight:700}
.stat .n{font-size:22px;font-weight:700;line-height:1.05}.stat .l{font-size:11.5px;color:var(--muted);margin-top:5px}
.card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:22px;margin-bottom:18px;box-shadow:var(--shadow)}
.card h3{font-size:15px;font-weight:700;margin:0 0 18px;display:flex;align-items:center;gap:8px}
.hint{font-size:11.5px;color:var(--muted);font-weight:400;line-height:1.5}
.field{margin-bottom:14px}.field label{display:block;font-size:12.5px;font-weight:600;color:var(--text2);margin-bottom:7px}
input,select,textarea{background:var(--card);border:1px solid var(--border-strong);color:var(--text);border-radius:9px;padding:10px 12px;outline:none;font:13px inherit;width:100%;transition:border-color .15s,box-shadow .15s}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
textarea{resize:vertical;min-height:112px;line-height:1.65}.mono-ta{background:var(--card2);font-family:"JetBrains Mono",ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:11px;min-height:82px}
.row{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap}.row .field{flex:1;min-width:150px;margin-bottom:0}
.btn{padding:9px 15px;border-radius:10px;border:1px solid var(--border-strong);background:var(--card);color:var(--text);font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:6px;white-space:nowrap;transition:background .15s,border-color .15s,color .15s,box-shadow .15s,transform .15s}
.btn:hover{background:var(--card2);border-color:var(--muted)}.btn:disabled{opacity:.45;cursor:not-allowed;pointer-events:none}.btn:active:not(:disabled){transform:translateY(1px)}
.btn-accent,.btn-danger{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 1px 2px rgba(0,0,0,.06),0 4px 12px rgba(0,153,255,.2)}
.btn-accent:hover,.btn-danger:hover{background:var(--accent-hover);border-color:var(--accent-hover)}
.btn-success{background:var(--card);color:var(--text2)}.btn-warning{background:transparent;border-color:var(--accent);color:var(--accent)}
.btn-warning:hover{background:var(--accent-soft);border-color:var(--accent)}
.btn-soft{background:transparent;border-color:transparent;color:var(--text2)}.btn-soft:hover{background:rgba(0,0,0,.05);border-color:transparent}
.btn-link{border:0;background:none;color:var(--accent);cursor:pointer;padding:0;font:inherit;font-size:12px}
.actions{display:flex;justify-content:flex-end;gap:9px;flex-wrap:wrap}
.cnt{text-align:right;color:var(--muted);font-size:11px;margin-top:4px}
.result{display:none;margin-top:12px;padding:12px 14px;border-radius:10px;font-size:12px;line-height:1.7}
.result.show{display:block}.result.ok{background:var(--accent-soft);border:1px solid rgba(0,153,255,.18);color:var(--text2)}.result.err{background:rgba(255,59,48,.06);border:1px solid rgba(255,59,48,.2);color:#bb2c24}
.records-head{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:14px}.records-head h3{margin:0}
.tbl-wrap{overflow:auto;border:1px solid var(--border);border-radius:12px}table{width:100%;border-collapse:collapse;font-size:12px}
th,td{text-align:left;padding:11px 12px;border-bottom:1px solid var(--border);vertical-align:top}
th{background:var(--card2);color:var(--muted);font-size:11px;font-weight:600;white-space:nowrap}tr:last-child td{border-bottom:0}tbody tr:hover{background:var(--card2)}
.mono{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:11px;word-break:break-all}.content-cell{max-width:310px;white-space:pre-wrap;word-break:break-word}
.empty{text-align:center;color:var(--muted);padding:32px 16px;font-size:12px}
.switcher{padding:8px 14px}
#toast{position:fixed;left:50%;bottom:30px;transform:translate(-50%,8px);opacity:0;pointer-events:none;z-index:30;background:rgba(0,0,0,.82);color:#fff;padding:10px 18px;border-radius:10px;font-size:12px;transition:.2s}
#toast.show{opacity:1;transform:translate(-50%,0)}
.spin{width:13px;height:13px;border:2px solid currentColor;border-right-color:transparent;border-radius:50%;opacity:.72;animation:spin .7s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:760px){.wrap{padding:24px 16px 40px}.stats{grid-template-columns:repeat(2,1fr);gap:10px}.hero{align-items:flex-start;flex-direction:column}.hero-actions{width:100%}.switcher{margin-left:auto}.card{padding:18px}.actions .btn{flex:1}}
</style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <div>
      <h1 id="hero-title">群聊主动推送</h1>
      <div class="sub" id="hero-sub">向全部全量群发送消息；全量发送会写入记录，继续推送自动跳过已记录群。</div>
    </div>
    <div class="hero-actions">
      <div class="mode-badge" id="mode-badge">群聊推送</div>
      <button class="btn btn-soft switcher" id="mode-switch" onclick="switchMode()">切换到私聊推送</button>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="ic">全</div><div><div class="n" id="st-targets">-</div><div class="l" id="st-target-label">全部目标</div></div></div>
    <div class="stat"><div class="ic">已</div><div><div class="n" id="st-sent">-</div><div class="l">已推送记录</div></div></div>
    <div class="stat"><div class="ic">待</div><div><div class="n" id="st-pending">-</div><div class="l">继续推送待发送</div></div></div>
    <div class="stat"><div class="ic">机</div><div><div class="n" id="st-bots">-</div><div class="l">可用机器人</div></div></div>
  </div>

  <div class="card">
    <h3>推送设置 <span class="hint" id="settings-hint"></span></h3>
    <div class="row">
      <div class="field" style="flex:2">
        <label id="test-label">测试群 openid</label>
        <input id="test_target" autocomplete="off">
      </div>
      <div class="field">
        <label>推送机器人</label>
        <select id="push_appid"></select>
      </div>
      <div class="field" style="max-width:125px;min-width:105px">
        <label>发送间隔(秒)</label>
        <input id="interval" type="number" min="0.1" max="10" step="0.1">
      </div>
      <button class="btn btn-accent" id="btn-save" onclick="saveMode()">保存设置</button>
    </div>
    <div class="field" style="margin-top:13px;margin-bottom:0">
      <label>消息按钮 JSON
        <button class="btn-link" onclick="fillBtnSample()">示例</button>
        <button class="btn-link" onclick="formatBtnJson()">格式化</button>
      </label>
      <textarea id="btn_json" class="mono-ta" placeholder='[[{"text":"菜单","data":"/菜单","enter":true}]]'></textarea>
    </div>
  </div>

  <div class="card">
    <h3 id="content-title">群聊发送内容 <span class="hint">群聊与私聊内容分别保存</span></h3>
    <div class="field">
      <textarea id="content" placeholder="输入要推送的消息内容…" oninput="updateCount()"></textarea>
      <div class="cnt"><span id="cnt">0</span> 字</div>
    </div>
    <div class="actions">
      <button class="btn btn-success" id="btn-test" onclick="testSend()">测试发送</button>
      <button class="btn btn-warning" id="btn-continue" onclick="broadcast(true)">继续推送</button>
      <button class="btn btn-danger" id="btn-push" onclick="broadcast(false)">全部发送</button>
    </div>
    <div class="result" id="send-result"></div>
  </div>

  <div class="card">
    <div class="records-head">
      <h3>已推送记录 <span class="hint">只记录全部发送/继续推送中成功送达的目标</span></h3>
      <button class="btn btn-soft" id="btn-clear" onclick="clearRecords()">删除已推送记录</button>
    </div>
    <div id="rec-table"></div>
  </div>
</div>
<div id="toast"></div>

<script>
const TOKEN=new URLSearchParams(location.search).get('token')||'';
const baseMatch=location.pathname.match(/^(.*)\/api\/web-pages\//);
const API=(baseMatch?baseMatch[1]:'')+'/api/ext/broadcast';
const META={
  group:{
    title:'群聊主动推送',badge:'群聊推送',next:'切换到私聊推送',targetLabel:'全量群数',
    testLabel:'测试群 openid',placeholder:'输入用于试发的群 openid',
    hint:'目标来自 data.db 的 full_access_groups 表',
    sub:'向全部全量群发送消息；全部发送会写入记录，继续推送自动跳过已记录群。'
  },
  private:{
    title:'私聊主动推送',badge:'私聊推送',next:'切换到群聊推送',targetLabel:'私聊用户数',
    testLabel:'测试用户 openid',placeholder:'输入用于试发的用户 openid',
    hint:'目标来自 data.db 的 members 表全部用户',
    sub:'向 data.db members 中全部用户发送私聊；继续推送自动跳过已记录用户。'
  }
};
let mode='group';
let data={config:{group:{},private:{}},stats:{group:{},private:{}},bots:[]};

function $(id){return document.getElementById(id)}
function headers(){return {'Content-Type':'application/json','Authorization':'Bearer '+TOKEN}}
async function api(path,method='GET',body){
  const suffix=method==='GET'?('?token='+encodeURIComponent(TOKEN)):'';
  const response=await fetch(API+path+suffix,{method,headers:headers(),body:body?JSON.stringify(body):undefined});
  return response.json();
}
function esc(value){return String(value??'').replace(/[&<>"]/g,char=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[char]))}
function toast(message){const el=$('toast');el.textContent=message;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2200)}
function updateCount(){$('cnt').textContent=($('content').value||'').length}
function setBusy(button,busy,text){button.disabled=busy;button.innerHTML=busy?'<span class="spin"></span>处理中…':text}
function parseButtons(){
  const raw=($('btn_json').value||'').trim();
  if(!raw)return {ok:true,value:[]};
  try{const value=JSON.parse(raw);return Array.isArray(value)?{ok:true,value}:{ok:false,message:'按钮配置需为 JSON 数组'}}
  catch(error){return {ok:false,message:'按钮 JSON 格式错误: '+error.message}}
}
function fillBtnSample(){$('btn_json').value=JSON.stringify([[{text:'菜单',data:'/菜单',enter:true}],[{text:'官网',link:'https://www.qq.com'}]],null,2)}
function formatBtnJson(){const parsed=parseButtons();if(!parsed.ok)return toast(parsed.message);$('btn_json').value=parsed.value.length?JSON.stringify(parsed.value,null,2):''}
function renderBots(current){
  let options='<option value="">（默认：第一个机器人）</option>',found=false;
  (data.bots||[]).forEach(bot=>{if(bot.appid===current)found=true;const label=bot.qq?('QQ '+bot.qq+' · '+bot.appid):bot.appid;options+=`<option value="${esc(bot.appid)}">${esc(label)}</option>`});
  if(current&&!found)options+=`<option value="${esc(current)}">${esc(current)} (当前)</option>`;
  $('push_appid').innerHTML=options;$('push_appid').value=current||'';
}
function renderRecords(records){
  if(!records.length){$('rec-table').innerHTML='<div class="empty">暂无已推送记录；“继续推送”会发送全部当前目标。</div>';return}
  const rows=records.map(record=>`<tr>
    <td class="mono">${esc(record.pushed_at)}</td>
    <td class="mono">${esc(record.target_id)}</td>
    <td>${record.source==='web'?'面板':'指令'}</td>
    <td class="content-cell">${esc(record.content)}</td>
    <td class="mono" title="${esc(record.raw)}">${esc((record.raw||'').slice(0,80))}</td>
  </tr>`).join('');
  $('rec-table').innerHTML=`<div class="tbl-wrap"><table><thead><tr><th>推送时间</th><th>目标 openid</th><th>来源</th><th>发送内容</th><th>接口返回</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}
function captureCurrent(){
  if(!data.config[mode])data.config[mode]={};
  const parsed=parseButtons();
  data.config[mode]={
    ...data.config[mode],
    test_target:$('test_target').value.trim(),
    push_appid:$('push_appid').value,
    interval:Number($('interval').value||0.5),
    buttons:parsed.ok?parsed.value:(data.config[mode].buttons||[]),
    content:$('content').value
  };
}
function render(){
  const meta=META[mode],cfg=data.config[mode]||{},stats=data.stats[mode]||{};
  $('hero-title').textContent=meta.title;$('hero-sub').textContent=meta.sub;$('mode-badge').textContent=meta.badge;
  $('mode-switch').textContent=meta.next;$('st-target-label').textContent=meta.targetLabel;$('settings-hint').textContent=meta.hint;
  $('test-label').textContent=meta.testLabel;$('test_target').placeholder=meta.placeholder;$('content-title').innerHTML=meta.badge+'发送内容 <span class="hint">群聊与私聊内容分别保存</span>';
  $('st-targets').textContent=stats.target_count??0;$('st-sent').textContent=stats.sent_count??0;$('st-pending').textContent=stats.pending_count??0;$('st-bots').textContent=(data.bots||[]).length;
  $('test_target').value=cfg.test_target||'';$('interval').value=cfg.interval??0.5;$('content').value=cfg.content||'';
  const buttons=Array.isArray(cfg.buttons)?cfg.buttons:[];$('btn_json').value=buttons.length?JSON.stringify(buttons,null,2):'';
  renderBots(cfg.push_appid||'');renderRecords(stats.records||[]);updateCount();$('send-result').className='result';
}
function switchMode(){captureCurrent();mode=mode==='group'?'private':'group';render()}
async function load(){
  const result=await api('/config');
  if(!result.success)return toast(result.message||'加载失败');
  data=result.data||data;render();
}
async function saveMode(silent=false){
  const parsed=parseButtons();if(!parsed.ok){toast(parsed.message);return false}
  captureCurrent();
  const button=$('btn-save');if(!silent)setBusy(button,true,'保存设置');
  try{
    const result=await api('/save','POST',{mode,data:data.config[mode]});
    if(!result.success){toast(result.message||'保存失败');return false}
    if(!silent)toast('当前模式设置已保存');
    return true;
  }finally{if(!silent)setBusy(button,false,'保存设置')}
}
function showResult(result){
  const box=$('send-result');box.className='result show '+(result.success?'ok':'err');
  let text=esc(result.message|| (result.success?'发送完成':'发送失败'));
  const failed=result.data?.failed||[];
  if(failed.length)text+='<br>'+failed.map(item=>`${esc(item.target_id)}: ${esc(item.message)}`).join('<br>');
  box.innerHTML=text;
}
async function testSend(){
  const content=$('content').value.trim();if(!content)return toast('请输入消息内容');
  if(!await saveMode(true))return;
  const button=$('btn-test');setBusy(button,true,'测试发送');
  try{showResult(await api('/test','POST',{mode,content}))}finally{setBusy(button,false,'测试发送')}
}
async function broadcast(continueOnly){
  const content=$('content').value.trim();if(!content)return toast('请输入消息内容');
  if(!await saveMode(true))return;
  await load();
  const stats=data.stats[mode]||{},meta=META[mode];
  const count=continueOnly?(stats.pending_count??0):(stats.target_count??0);
  const action=continueOnly?'继续推送':'全部发送';
  if(!confirm(`确认${action}到 ${count} 个${meta.targetLabel.replace('数','')}？`))return;
  const button=continueOnly?$('btn-continue'):$('btn-push');setBusy(button,true,action);
  try{
    const result=await api('/broadcast','POST',{mode,content,continue_only:continueOnly});
    if(result.success)await load();
    showResult(result);
  }finally{setBusy(button,false,action)}
}
async function clearRecords(){
  if(!await saveMode(true))return;
  await load();
  if(!confirm('确认删除当前模式、当前机器人下的全部已推送记录？删除后继续推送会重新发送所有目标。'))return;
  const button=$('btn-clear');setBusy(button,true,'删除已推送记录');
  try{
    const result=await api('/records/clear','POST',{mode});
    toast(result.message||'操作完成');
    if(result.success)await load();
  }finally{setBusy(button,false,'删除已推送记录')}
}
function applyTheme(){
  try{
    const style=getComputedStyle(window.parent.document.documentElement),root=document.documentElement.style;
    const map={
      '--bg':['--bg','--background'],'--card':['--bg2','--card'],'--card2':['--bg3','--bg2'],
      '--text':['--text','--fg'],'--text2':['--text2','--text','--fg'],'--muted':['--text3','--muted'],
      '--border':['--border','--bd'],'--border-strong':['--border2','--border','--bd']
    };
    Object.entries(map).forEach(([target,sources])=>{for(const source of sources){const value=style.getPropertyValue(source).trim();if(value){root.setProperty(target,value);break}}});
  }catch(error){}
}
applyTheme();load();
</script>
</body>
</html>
